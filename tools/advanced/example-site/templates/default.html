<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{{title}}</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 720px; margin: 2em auto; padding: 0 1em; line-height: 1.5; color: #1b1b1b; }
    h1, h2, h3 { line-height: 1.2; }
    a { color: #5a3fbf; }
    code { background: #f4f4f6; padding: 0.1em 0.3em; border-radius: 3px; }
    pre { background: #f4f4f6; padding: 0.8em; border-radius: 4px; overflow-x: auto; }
    pre code { background: none; padding: 0; }
    nav { margin-bottom: 2em; padding-bottom: 0.5em; border-bottom: 1px solid #ddd; }
    small { color: #666; }
  </style>
</head>
<body>
  <nav><a href="/index.html">home</a></nav>
  <article>
    <h1>{{title}}</h1>
    <p><small>{{date}}</small></p>
    {{body}}
  </article>
</body>
</html>
