<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-label="OMG bytecode file">
  <!--
    Variant for compiled `.omgb` bytecode files.  Same turquoise + tight
    monospace as the source icon; four glyphs ("omgb") at a smaller
    point size so the trailing `b` distinguishes bytecode from source
    at a glance in the file tree.
  -->
  <text x="16" y="22"
        font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
        font-weight="800"
        font-size="10"
        text-anchor="middle"
        fill="#40E0D0"
        letter-spacing="-0.5">omgb</text>
</svg>
