name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same ref when a new commit lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  test:
    name: Build & test (Rust runtime)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: runtime -> target

      # Building also runs `runtime/build.rs`, which bootstraps
      # `bootstrap/compiler.omgb` from `bootstrap/compiler.omg` using the
      # Rust frontend. If the bootstrap is broken, the build fails here.
      - name: Build (release)
        run: cargo build --release --manifest-path runtime/Cargo.toml

      - name: Run unit tests
        run: cargo test --manifest-path runtime/Cargo.toml

      # Self-hosting regression guard: confirm the OMG-in-OMG compiler
      # (running on the VM) produces byte-identical output to the Rust
      # frontend when compiling its own source.
      - name: Verify self-hosted fixed point
        run: ./runtime/target/release/omg --verify-self-hosted bootstrap/compiler.omg

      # Triple-meta regression guard: same as above, but with the OMG
      # compiler running on the OMG-written VM (bootstrap/vm.omg).
      # Strongest fixed-point check the project supports — guarantees
      # both stage-1 components behave like their Rust counterparts on
      # the input. We use prime_sieve.omg here rather than compiler.omg
      # itself to keep CI runtime under a second; the equivalent check
      # against compiler.omg passes locally but takes ~45 s.
      - name: Verify triple-meta fixed point
        run: ./runtime/target/release/omg --verify-omg-vm examples/prime_sieve.omg
